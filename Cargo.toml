[package]
name = "ai-mate"
version = "0.3.3"
edition = "2024"
build = "build.rs"

authors = ["David Valin <hola@davidvalin.com>"]
homepage = "https://github.com/DavidValin/ai-mate"
repository = "https://github.com/DavidValin/ai-mate"
description = "A simple audio ai conversation system"
license-file = "LICENSE"
readme = "README.md"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
cpal = "0.15"
crossbeam-channel = "0.5"
reqwest = { version = "0.12", features = ["stream", "multipart", "blocking", "json", "rustls-tls"] }
futures-util = "0.3"   # for StreamExt
bytes = "1.4"          # for Bytes in streaming
serde = { version = "1", features = ["derive"] }
serde_json = "1"
urlencoding = "2"
whisper-rs = { version = "0.15.1" }
hound = "3"
crossterm = "0.27"
tokio = { version = "1", features = ["rt", "macros"] }
kokoro-tiny = { version = "0.2.0", git = "https://github.com/DavidValin/kokoro-tiny.git", rev = "cd9524a", features = ["as-lib"] }
ort = { version = "2.0.0-rc.11", default-features = false, features = [ "std", "ndarray", "tls-rustls" ] }
flate2 = "1"
tar = "0.4"
sha2 = "0.10"
hex = "0.4"
directories = "5"
log = "0.4"
env_logger = "0.11"

[build-dependencies]
sha2 = "0.10"
hex = "0.4"
once_cell = "1"

[profile.release]
opt-level = 3
codegen-units = 1
lto = "thin"
panic = "abort"
strip = "symbols"
incremental = false

[features]
default               = []
whisper-openblas      = ["whisper-rs/openblas"]
whisper-vulkan        = ["whisper-rs/vulkan"]
whisper-cuda          = ["whisper-rs/cuda"]
whisper-hipblas       = ["whisper-rs/hipblas"]
whisper-metal         = ["whisper-rs/metal"]
whisper-logs          = ["whisper-rs/log_backend", "whisper-rs/tracing_backend"]
ort-download-binaries = ["ort/download-binaries"]