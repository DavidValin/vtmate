name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  windows-x64:
    name: Windows Build (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Directories
        run: |
          mkdir dist
          mkdir packages

      # ----------------------
      # Cache CUDA SDK
      - name: Cache CUDA SDK
        uses: actions/cache@v3
        id: cuda-cache
        with:
          path: C:\ProgramData\chocolatey\lib\cuda
          key: windows-cuda-12-2

      - name: Install CUDA SDK (if not cached)
        if: steps.cuda-cache.outputs.cache-hit != 'true'
        run: |
          choco install cuda -y
          refreshenv

      - name: Prepare AI models
        run: |
          mkdir "%USERPROFILE%\.cache\k"
          mkdir "%USERPROFILE%\.whisper-models"
          curl -L https://github.com/DavidValin/kokoro-tiny/raw/main/models/0.bin -o "%USERPROFILE%\.cache\k\0.bin"
          curl -L https://github.com/DavidValin/kokoro-tiny/raw/main/models/0.onnx -o "%USERPROFILE%\.cache\k\0.onnx"
          curl -L https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin -o "%USERPROFILE%\.whisper-models\ggml-small.bin"
          curl -L https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin -o "%USERPROFILE%\.whisper-models\ggml-tiny.bin"

      # ----------------------
      # Build Windows CPU Variant
      - name: Build Windows CPU
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          call "%CD%\build_windows.bat" cpu

      # ----------------------
      # Build Windows OpenBLAS Variant
      - name: Build Windows OpenBLAS
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          call "%CD%\build_windows.bat" openblas

      # ----------------------
      # Build Windows Vulkan Variant
      - name: Build Windows Vulkan
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          call "%CD%\build_windows.bat" vulkan

      # ----------------------
      # Build Windows CUDA Variant
      - name: Build Windows CUDA
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          call "%CD%\build_windows.bat" cuda

      # ----------------------
      # Upload artifacts
      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-cpu
          path: target-cross\cpu

      - name: Upload OpenBLAS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-openblas
          path: target-cross\openblas

      - name: Upload Vulkan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-vulkan
          path: target-cross\vulkan

      - name: Upload CUDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-cuda
          path: target-cross\cuda
