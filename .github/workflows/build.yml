name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------
  # Linux AMD64
  # ----------------------
  linux-amd64:
    name: Linux Build (amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # ----------------------
      # Rust caches
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-linux-amd64-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: cargo-git-linux-amd64-${{ hashFiles('**/Cargo.lock') }}

      # ----------------------
      # CUDA SDK cache & install
      - name: Cache CUDA SDK
        uses: actions/cache@v3
        with:
          path: /usr/local/cuda-12.2
          key: cuda-sdk-12-2

      - name: Install CUDA SDK
        run: |
          if [ ! -d /usr/local/cuda-12.2 ]; then
            echo "CUDA not cached, installing..."
            sudo apt-get update
            sudo apt-get install -y wget gnupg software-properties-common libtinfo6
            wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.1-1_all.deb
            sudo dpkg -i cuda-keyring_1.1-1_all.deb
            sudo apt-get update
            sudo apt-get install -y cuda-toolkit-12-2
          else
            echo "CUDA SDK already cached, skipping installation"
          fi

      # ----------------------
      # Model assets cache
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/k
            ~/.whisper-models
          key: model-assets-v1

      - name: Download Model Assets
        run: |
          mkdir -p ~/.cache/k ~/.whisper-models
          for file in 0.bin 0.onnx; do
            [ -f ~/.cache/k/$file ] || curl -L -o ~/.cache/k/$file https://github.com/DavidValin/kokoro-tiny/raw/main/models/$file
          done
          for model in ggml-small ggml-tiny; do
            [ -f ~/.whisper-models/${model}.bin ] || curl -L -o ~/.whisper-models/${model}.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/${model}.bin
          done

      # ----------------------
      # Increase Swap
      - name: Increase Swap
        run: |
          if swapon --show | grep -q '/swapfile'; then
            echo "Swap already enabled"
          else
            echo "Creating swap..."
            sudo swapoff -a || true
            sudo rm -f /swapfile || true
            sudo fallocate -l 8G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          echo "Current swap:"
          swapon --show
          free -h

      # ----------------------
      # Build CPU variant
      - name: Build CPU Variant
        run: |
          chmod +x ./build_linux.sh
          echo "Building CPU variant (OpenBLAS static)"
          WITH_CUDA=0 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=0 ./build_linux.sh --arch amd64
          mkdir -p ./dist/cpu
          mv ./dist/* ./dist/cpu/
        env:
          CARGO_BUILD_JOBS: 1

      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-cpu
          path: dist/*-linux-amd64-cpu

      # ----------------------
      # Build CUDA variant
      - name: Build CUDA Variant
        run: |
          chmod +x ./build_linux.sh
          echo "Building CUDA variant"
          WITH_CUDA=1 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=1 ./build_linux.sh --arch amd64
          mkdir -p ./dist/cuda
          mv ./dist/* ./dist/cuda/
        env:
          CARGO_BUILD_JOBS: 1

      - name: Upload CUDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-cuda
          path: dist/*-linux-amd64-cuda

  # ----------------------
  # Linux ARM64
  # ----------------------
  linux-arm64:
    name: Linux Build (arm64)
    runs-on: ubuntu-22.04
    needs: linux-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Build CPU Variant
        run: |
          chmod +x ./build_linux.sh
          echo "Building CPU variant (OpenBLAS static)"
          WITH_CUDA=0 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=0 ./build_linux.sh --arch arm64
          mkdir -p ./dist/cpu
          mv ./dist/* ./dist/cpu/
        env:
          CARGO_BUILD_JOBS: 2

      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-cpu
          path: dist/*-linux-arm64-cpu

  # ----------------------
  # Windows x64
  # ----------------------
  windows-x64:
    name: Windows Build (x64)
    runs-on: windows-latest
    needs: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Directories
        run: |
          mkdir dist
          mkdir packages

      # ----------------------
      # Cache CUDA SDK
      - name: Cache CUDA SDK
        uses: actions/cache@v3
        id: cuda-cache
        with:
          path: C:\ProgramData\chocolatey\lib\cuda
          key: windows-cuda-12-2

      - name: Install CUDA SDK (if not cached)
        if: steps.cuda-cache.outputs.cache-hit != 'true'
        run: |
          choco install cuda -y
          refreshenv

      # ----------------------
      # Build Windows Variants
      - name: Build Windows Variants
        shell: cmd
        run: |
          REM ----- Setup MSVC environment -----
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          set WIN_ARCH=x64
          call "%CD%\build_windows.bat"

      # ----------------------
      # Upload artifacts
      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-cpu
          path: dist\cpu

      - name: Upload CUDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-cuda
          path: dist\cuda
