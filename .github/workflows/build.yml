name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------
  # Linux Builds
  # ----------------------
  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: cargo-git-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Download Model Assets
        run: |
          mkdir -p ~/.cache/k ~/.whisper-models
          for file in 0.bin 0.onnx; do
            [ -f ~/.cache/k/$file ] || curl -L -o ~/.cache/k/$file https://github.com/DavidValin/kokoro-tiny/raw/main/models/$file
          done
          for model in ggml-small ggml-tiny; do
            [ -f ~/.whisper-models/${model}.bin ] || curl -L -o ~/.whisper-models/${model}.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/${model}.bin
          done

      - name: Build Linux Variants
        run: |
          chmod +x ./build_linux.sh

          # CPU-only
          ./build_linux.sh --arch ${{ matrix.arch }} --features "whisper-openblas" --output dist/cpu

          # CUDA-enabled (ensure SDK present)
          sudo apt-get update && sudo apt-get install -y nvidia-cuda-toolkit
          ./build_linux.sh --arch ${{ matrix.arch }} --features "whisper-cuda" --output dist/cuda

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ./dist

  # ----------------------
  # Windows Builds
  # ----------------------
  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Directories
        run: |
          mkdir dist
          mkdir packages

      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CUDA SDK
        shell: powershell
        run: |
          choco install cuda -y
          refreshenv

      - name: Build Windows Variants
        shell: cmd
        run: |
          REM CPU-only
          build_windows.bat --features whisper-openblas --output dist\cpu

          REM CUDA-enabled
          build_windows.bat --features whisper-cuda --output dist\cuda

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ./dist
