name: Build All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ----------------------
  # Linux Builds (amd64 + arm64 in parallel)
  # ----------------------
  linux:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Linux Docker image
        run: |
          docker build \
            --build-arg ARCH=${{ matrix.arch }} \
            -f Dockerfile.linux.${{ matrix.arch }} \
            -t ai-mate-linux-${{ matrix.arch }} .

      - name: Save Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/

  # ----------------------
  # Windows Builds
  # ----------------------
  windows:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path packages

      - name: Build Windows executable
        run: .\build_windows.ps1 ${{ matrix.arch }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/

  # ----------------------
  # macOS Universal (Intel + Apple Silicon) using Sequoia
  # ----------------------
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sequoia
        run: |
          curl -sSf https://install.sequoia.dev | sh

      - name: Build macOS universal binary
        run: |
          sequoia build \
            --build-type universal \
            --min-macos-version 10.15 \
            --output dist/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: dist/
