name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------
  # Linux Builds (amd64 + arm64 via QEMU)
  # ----------------------
  linux:
    name: Linux Build (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup QEMU for multi-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Cache Rust and Cargo targets
      - name: Cache Cargo Registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-linux-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo Git
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: cargo-git-linux-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo Target
        uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-linux-${{ hashFiles('**/Cargo.lock') }}

      # Prepare model assets
      - name: Download Model Assets
        run: |
          mkdir -p ~/.cache/k ~/.whisper-models
          for file in 0.bin 0.onnx; do
            [ -f ~/.cache/k/$file ] || curl -L -o ~/.cache/k/$file https://github.com/DavidValin/kokoro-tiny/raw/main/models/$file
          done
          for model in ggml-small ggml-tiny; do
            [ -f ~/.whisper-models/${model}.bin ] || curl -L -o ~/.whisper-models/${model}.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/${model}.bin
          done

      - name: Build Linux (all archs)
        run: |
          chmod +x ./build_linux.sh
          ./build_linux.sh --arch all

      # Upload artifact
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-all
          path: ./dist

  # ----------------------
  # macOS Builds
  # ----------------------
  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Sequoia
      - name: Install Sequoia
        uses: sequoia-io/sequoia-action@v1

      # Build macOS
      - name: Build macOS
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ./dist

  # ----------------------
  # Windows Builds
  # ----------------------
  windows:
    name: Windows Build (x64 + arm64)
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup build directories
      - name: Prepare Directories
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path packages

      # Build Windows
      - name: Build Windows
        run: pwsh -File ${{ github.workspace }}\build_windows.ps1 -Arch ${{ matrix.arch }}

      # Upload Windows artifacts
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: ./dist
