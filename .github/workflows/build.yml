name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------
  # Linux Builds
  # ----------------------
  linux:
    name: Linux Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------
      # Cache mounts
      # ----------------------
      - name: Cache K Directory
        uses: actions/cache@v3
        with:
          path: /home/runner/.cache/k
          key: linux-k-${{ matrix.arch }}-${{ hashFiles('**/build_linux.sh') }}
      - name: Cache Whisper Models
        uses: actions/cache@v3
        with:
          path: /home/runner/.whisper-models
          key: linux-whisper-${{ matrix.arch }}-${{ hashFiles('**/build_linux.sh') }}

      # ----------------------
      # QEMU setup for cross-arch
      # ----------------------
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make Linux Build Script Executable
        run: chmod +x ./build_linux.sh

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y curl xz-utils build-essential

      - name: Build Linux (${{ matrix.arch }})
        run: ./build_linux.sh --arch ${{ matrix.arch }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ./dist

  # ----------------------
  # macOS Builds
  # ----------------------
  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------
      # Cache mounts for macOS
      # ----------------------
      - name: Cache K Directory
        uses: actions/cache@v3
        with:
          path: ~/Library/Caches/k
          key: macos-k-${{ hashFiles('**/build_macos.sh') }}
      - name: Cache Whisper Models
        uses: actions/cache@v3
        with:
          path: ~/Library/Caches/whisper-models
          key: macos-whisper-${{ hashFiles('**/build_macos.sh') }}

      - name: Install Sequoia
        uses: sormy/sequoia-action@v1

      - name: Make macOS Build Script Executable
        run: chmod +x ./build_macos.sh

      - name: Build macOS
        run: ./build_macos.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ./dist

  # ----------------------
  # Windows Builds
  # ----------------------
  windows:
    name: Windows Build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Directory Setup
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path packages

      - name: Build Windows (${{ matrix.arch }})
        shell: pwsh
        run: ./build_windows.ps1 -Arch ${{ matrix.arch }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: ./dist
