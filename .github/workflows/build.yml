name: Build AI-Mate

on:
  push:
    branches:
      - main
      - ci-test
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64

          # macOS
          - os: macos-latest
            arch: native

          # Windows
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # LINUX
      # -------------------------
      - name: Verify Docker (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: docker --version

      - name: Download Linux build script
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          curl -L -o build_linux.sh https://raw.githubusercontent.com/DavidValin/ai-mate/refs/heads/main/build_linux.sh
          chmod +x build_linux.sh

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          ./build_linux.sh --arch ${{ matrix.arch }}

      # -------------------------
      # macOS
      # -------------------------
      - name: Download macOS build script
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          curl -L -o build_macos.sh https://raw.githubusercontent.com/DavidValin/ai-mate/refs/heads/main/build_macos.sh
          chmod +x build_macos.sh

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          ./build_macos.sh

      # -------------------------
      # WINDOWS
      # -------------------------
      - name: Download Windows build script
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          curl -L -o build_windows.bat https://raw.githubusercontent.com/DavidValin/ai-mate/refs/heads/main/build_windows.bat

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          set WIN_WITH_VULKAN=0
          build_windows.bat --arch %ARCH%
        env:
          ARCH: ${{ matrix.arch }}

      # -------------------------
      # Upload Artifacts
      # -------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-mate-${{ matrix.os }}-${{ matrix.arch }}
          path: dist
