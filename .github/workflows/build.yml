name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------
  # Linux Builds
  # ----------------------
  linux:
    name: Linux Build (${{ matrix.arch }})
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        arch: [amd64, arm64]
    concurrency:
      group: linux-${{ matrix.arch }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # ----------------------
      # Rust caches
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: cargo-git-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      # ----------------------
      # CUDA cache
      - name: Cache CUDA SDK (amd64 only)
        if: matrix.arch == 'amd64'
        uses: actions/cache@v3
        with:
          path: /usr/local/cuda-12.2
          key: cuda-sdk-12-2

      - name: Install CUDA SDK (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          if [ ! -d /usr/local/cuda-12.2 ]; then
            echo "CUDA not cached, installing..."
            sudo apt-get update
            sudo apt-get install -y wget gnupg software-properties-common libtinfo6

            # Download & install the NVIDIA keyring package
            wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.1-1_all.deb
            sudo dpkg -i cuda-keyring_1.1-1_all.deb

            # Update apt and install CUDA toolkit
            sudo apt-get update
            sudo apt-get install -y cuda-toolkit-12-2
          else
            echo "CUDA SDK already cached, skipping installation"
          fi

      # ----------------------
      # Model assets cache
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/k
            ~/.whisper-models
          key: model-assets-v1

      - name: Download Model Assets
        run: |
          mkdir -p ~/.cache/k ~/.whisper-models
          for file in 0.bin 0.onnx; do
            [ -f ~/.cache/k/$file ] || curl -L -o ~/.cache/k/$file https://github.com/DavidValin/kokoro-tiny/raw/main/models/$file
          done
          for model in ggml-small ggml-tiny; do
            [ -f ~/.whisper-models/${model}.bin ] || curl -L -o ~/.whisper-models/${model}.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/${model}.bin
          done

      # ----------------------
      # Build variants
      - name: Build CPU Variant (OpenBLAS statically linked)
        run: |
          chmod +x ./build_linux.sh
          echo "Building CPU variant (OpenBLAS static)"
          WITH_CUDA=0 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=0 ./build_linux.sh --arch ${{ matrix.arch }}
          mkdir -p ./dist/cpu
          mv ./dist/* ./dist/cpu/
          echo "Uploading CPU artifact"
          gh workflow upload-artifact ./dist/cpu name=linux-${{ matrix.arch }}-cpu
        env:
          CARGO_BUILD_JOBS: 2

      - name: Build CUDA Variant (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          chmod +x ./build_linux.sh
          echo "Building CUDA variant"
          WITH_CUDA=1 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=1 ./build_linux.sh --arch ${{ matrix.arch }}
          mkdir -p ./dist/cuda
          mv ./dist/* ./dist/cuda/
          echo "Uploading CUDA artifact"
          gh workflow upload-artifact ./dist/cuda name=linux-amd64-cuda
        env:
          CARGO_BUILD_JOBS: 2

# ----------------------
# Windows Builds
# ----------------------
  windows:
    name: Windows Build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    concurrency:
      group: windows-${{ matrix.arch }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Directories
        run: |
          mkdir dist
          mkdir packages

      - name: Cache CUDA SDK
        uses: actions/cache@v3
        id: cuda-cache
        with:
          path: C:\ProgramData\chocolatey\lib\cuda
          key: windows-cuda-12-2

      - name: Install CUDA SDK (if not cached)
        if: steps.cuda-cache.outputs.cache-hit != 'true'
        run: |
          choco install cuda -y
          refreshenv

      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build Windows Variants
        shell: cmd
        run: |
          setlocal EnableDelayedExpansion

          REM x64 builds: CPU + CUDA, ARM64 builds: CPU only
          if "%PROCESSOR_ARCHITECTURE%"=="AMD64" (
              set VARIANTS=WIN_WITH_OPENBLAS=1,WIN_WITH_CUDA=1
          ) else (
              set VARIANTS=WIN_WITH_OPENBLAS=1
          )

          for %%v in (%VARIANTS%) do (
              if "%%v"=="WIN_WITH_OPENBLAS=1" (set ART_NAME=cpu) else (set ART_NAME=cuda)

              REM Clear folder to avoid collisions
              if exist dist\!ART_NAME! rmdir /s /q dist\!ART_NAME!
              mkdir dist\!ART_NAME!

              echo Building variant %%v in MSVC environment
              call build_windows.bat %%v

              move dist\* dist\!ART_NAME!
          )

      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-cpu
          path: dist\cpu

      - name: Upload CUDA Artifact
        if: contains(steps.build-variants.outputs.variant-list, 'cuda')
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-cuda
          path: dist\cuda

