name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------
  # Linux Builds
  # ----------------------
  linux:
    name: Linux Build (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64, arm64]
    concurrency:
      group: linux-${{ matrix.arch }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # ----------------------
      # Rust caches
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: cargo-git-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      # ----------------------
      # CUDA SDK cache & install (amd64 only)
      - name: Cache CUDA SDK (amd64 only)
        if: matrix.arch == 'amd64'
        uses: actions/cache@v3
        with:
          path: /usr/local/cuda-12.2
          key: cuda-sdk-12-2

      - name: Install CUDA SDK (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          if [ ! -d /usr/local/cuda-12.2 ]; then
            echo "CUDA not cached, installing..."
            sudo apt-get update
            sudo apt-get install -y wget gnupg software-properties-common libtinfo6

            wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.1-1_all.deb
            sudo dpkg -i cuda-keyring_1.1-1_all.deb

            sudo apt-get update
            sudo apt-get install -y cuda-toolkit-12-2
          else
            echo "CUDA SDK already cached, skipping installation"
          fi

      # ----------------------
      # Model assets cache
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/k
            ~/.whisper-models
          key: model-assets-v1

      - name: Download Model Assets
        run: |
          mkdir -p ~/.cache/k ~/.whisper-models
          for file in 0.bin 0.onnx; do
            [ -f ~/.cache/k/$file ] || curl -L -o ~/.cache/k/$file https://github.com/DavidValin/kokoro-tiny/raw/main/models/$file
          done
          for model in ggml-small ggml-tiny; do
            [ -f ~/.whisper-models/${model}.bin ] || curl -L -o ~/.whisper-models/${model}.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/${model}.bin
          done

      # ----------------------
      # Increase Swap to avoid SIGKILL
      - name: Increase Swap
        if: matrix.arch == 'amd64'
        run: |
          if swapon --show | grep -q '/swapfile'; then
            echo "Swap already enabled"
          else
            echo "Creating swap..."
            sudo swapoff -a || true
            sudo rm -f /swapfile || true
            sudo fallocate -l 8G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

          echo "Current swap:"
          swapon --show
          free -h

      # ----------------------
      # Build CPU variant (OpenBLAS static)
      - name: Build CPU Variant
        run: |
          chmod +x ./build_linux.sh
          echo "Building CPU variant (OpenBLAS static)"
          WITH_CUDA=0 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=0 ./build_linux.sh --arch ${{ matrix.arch }}
          mkdir -p ./dist/cpu
          mv ./dist/* ./dist/cpu/
        env:
          CARGO_BUILD_JOBS: 2

      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-cpu
          path: dist/*-linux-${{ matrix.arch }}-cpu

      # ----------------------
      # Build CUDA variant (amd64 only)
      - name: Build CUDA Variant
        if: matrix.arch == 'amd64'
        run: |
          chmod +x ./build_linux.sh
          echo "Building CUDA variant"
          WITH_CUDA=1 WITH_ROCM=0 LINUX_WITH_OPENBLAS=1 LINUX_WITH_VULKAN=1 ./build_linux.sh --arch ${{ matrix.arch }}
          mkdir -p ./dist/cuda
          mv ./dist/* ./dist/cuda/
        env:
          CARGO_BUILD_JOBS: 2

      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-cpu
          path: dist/*-linux-${{ matrix.arch }}-cpu

  # ----------------------
  # Windows Builds
  # ----------------------
  windows:
    name: Windows Build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    concurrency:
      group: windows-${{ matrix.arch }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Directories
        run: |
          mkdir dist
          mkdir packages

      # ----------------------
      # Cache CUDA SDK
      - name: Cache CUDA SDK
        uses: actions/cache@v3
        id: cuda-cache
        with:
          path: C:\ProgramData\chocolatey\lib\cuda
          key: windows-cuda-12-2

      - name: Install CUDA SDK (if not cached)
        if: steps.cuda-cache.outputs.cache-hit != 'true'
        run: |
          choco install cuda -y
          refreshenv

      # ----------------------
      # Setup MSVC environment
      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      # ----------------------
      # Build Windows Variants
      - name: Build Windows Variants
        shell: cmd
        run: |
          REM ----- Project directories -----
          set PROJECT_ROOT=%CD%
          set TARGET_DIR=%PROJECT_ROOT%\target-cross
          set DIST_DIR=%PROJECT_ROOT%\dist

          REM ----- Define variants per architecture -----
          if "%PROCESSOR_ARCHITECTURE%"=="AMD64" (
              set VARIANTS=cpu cuda
          ) else (
              set VARIANTS=cpu
              echo Skipping CUDA on ARM64
          )

          REM ----- Build each variant -----
          for %%v in (%VARIANTS%) do (
              set ART_NAME=%%v

              REM ----- Set env vars for batch -----
              set WIN_WITH_OPENBLAS=0
              set WIN_WITH_CUDA=0
              if "%%v"=="cpu" set WIN_WITH_OPENBLAS=1
              if "%%v"=="cuda" set WIN_WITH_CUDA=1

              REM ----- Clean and prepare dist folder -----
              if exist %DIST_DIR%\!ART_NAME! rmdir /s /q %DIST_DIR%\!ART_NAME!
              mkdir %DIST_DIR%\!ART_NAME!

              REM ----- Call batch script in the same shell -----
              echo Building variant %%v...
              call "%PROJECT_ROOT%\build_windows.bat" %%v

              REM ----- Copy output to dist -----
              if exist "%TARGET_DIR%\%%v\*" (
                  echo Copying built files for %%v...
                  xcopy /Y /I /E "%TARGET_DIR%\%%v\*" "%DIST_DIR%\%%v\"
              ) else (
                  echo WARNING: No files produced for variant %%v
              )
          )

      # ----------------------
      # Upload artifacts
      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-cpu
          path: dist\cpu

      - name: Upload CUDA Artifact
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-cuda
          path: dist\cuda


