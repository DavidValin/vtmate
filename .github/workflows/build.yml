name: Build All Platforms

on:
  push:
    branches:
      - '**'          # Trigger on any branch for testing
  pull_request:
    branches:
      - '**'          # Trigger on any PR for testing

# ----------------------
# Linux Builds
# ----------------------
jobs:
  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]   # Run each Linux arch in parallel
    steps:
      - uses: actions/checkout@v4

      # QEMU for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # Rust caching
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: cargo-git-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      # Download model assets
      - name: Download Model Assets
        run: |
          mkdir -p ~/.cache/k ~/.whisper-models
          for file in 0.bin 0.onnx; do
            [ -f ~/.cache/k/$file ] || curl -L -o ~/.cache/k/$file https://github.com/DavidValin/kokoro-tiny/raw/main/models/$file
          done
          for model in ggml-small ggml-tiny; do
            [ -f ~/.whisper-models/${model}.bin ] || curl -L -o ~/.whisper-models/${model}.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/${model}.bin
          done

      - name: Build Linux
        run: |
          chmod +x ./build_linux.sh
          ./build_linux.sh --arch ${{ matrix.arch }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ./dist

# ----------------------
# macOS Builds
# ----------------------
  macos:
    name: macOS Build
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]   # Only arm64 works reliably on GitHub runners
    steps:
      - uses: actions/checkout@v4

      # Build macOS
      - name: Build macOS
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ./dist

# ----------------------
# Windows Builds
# ----------------------
  windows:
    name: Windows Build
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      # Prepare directories
      - name: Prepare Directories
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path packages

      # Build Windows
      - name: Build Windows
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File "${{ github.workspace }}\build_windows.ps1" -Arch ${{ matrix.arch }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: ./dist
