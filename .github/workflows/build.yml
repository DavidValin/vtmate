name: Build All Platforms

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ----------------- Linux -----------------
  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for multiarch
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl tar xz-utils

      - name: Run Linux build
        run: |
          chmod +x ./build_linux.sh
          ./build_linux.sh --arch ${{ matrix.arch }}

      - name: Upload Linux CPU variant
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-cpu
          path: dist/ai-mate-*-linux-${{ matrix.arch }}-cpu

      - name: Upload Linux OpenBLAS variant
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-openblas
          path: dist/ai-mate-*-linux-${{ matrix.arch }}-openblas

      - name: Upload Linux Vulkan variant
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-vulkan
          path: dist/ai-mate-*-linux-${{ matrix.arch }}-vulkan

      - name: Upload Linux CUDA variant (amd64 only)
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-cuda
          path: dist/ai-mate-*-linux-amd64-cuda

      - name: Upload Linux ROCm variant (amd64 only)
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-rocm
          path: dist/ai-mate-*-linux-amd64-rocm

  # ----------------- Windows -----------------
  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run Windows build
        run: |
          set CI=1
          powershell -Command "chmod +x build_windows.ps1; ./build_windows.ps1"

      - name: Upload Windows CPU variant
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-cpu
          path: dist/ai-mate-*-windows-${{ matrix.arch }}-cpu.exe

      - name: Upload Windows OpenBLAS variant
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-openblas
          path: dist/ai-mate-*-windows-${{ matrix.arch }}-openblas.exe

      - name: Upload Windows Vulkan variant
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-vulkan
          path: dist/ai-mate-*-windows-${{ matrix.arch }}-vulkan.exe

      - name: Upload Windows CUDA variant (x86_64 only)
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-cuda
          path: dist/ai-mate-*-windows-x86_64-cuda.exe

      - name: Upload Windows ROCm variant (x86_64 only)
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-rocm
          path: dist/ai-mate-*-windows-x86_64-rocm.exe

  # ----------------- macOS -----------------
  build-macos:
    name: Build macOS Binaries
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run macOS build
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh --arch ${{ matrix.arch }}

      - name: Upload macOS CPU variant
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-cpu
          path: dist/ai-mate-*-macos-${{ matrix.arch }}-cpu

      - name: Upload macOS OpenBLAS variant
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-openblas
          path: dist/ai-mate-*-macos-${{ matrix.arch }}-openblas

      - name: Upload macOS Vulkan variant
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-vulkan
          path: dist/ai-mate-*-macos-${{ matrix.arch }}-vulkan
